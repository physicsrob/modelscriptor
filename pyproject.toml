[project]
name = "modelscriptor"
version = "0.1.0"
description = "A compiler that transforms computation graphs into transformer neural network weights"
requires-python = ">=3.10"
dependencies = [
    "torch",
    "ortools",
    "onnx",
    "onnxruntime",
]

[dependency-groups]
dev = [
    "black",
    "mypy",
    "pytest",
]

[tool.mypy]
ignore_missing_imports = true
